name: Daily Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Full scrape'
        required: false
        default: false
        type: boolean
      date_from:
        description: 'Date from (YYYY-MM-DD)'
        required: false
        default: ''
        type: string
      date_to:
        description: 'Date to (YYYY-MM-DD)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 playwright

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          if [ -n "${{ inputs.date_from }}" ] && [ -n "${{ inputs.date_to }}" ]; then
            echo "Running range scrape: ${{ inputs.date_from }} ~ ${{ inputs.date_to }}"
            python scraper.py --from "${{ inputs.date_from }}" --to "${{ inputs.date_to }}"
          elif [ "${{ inputs.full_scrape }}" = "true" ]; then
            echo "Running full scrape..."
            python scraper.py --full
          else
            echo "Running daily scrape..."
            python scraper.py
          fi

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update data"

      - name: Push
        run: |
          git push
