<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NT Records">
<title>NEWTONE RECORDS — 新譜チェック</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #d4ff00;
    --accent2: #ff4b00;
    --text: #e8e8e8;
    --muted: #666;
    --checked-bg: #1a1f00;
    --checked-text: #6a8a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  #app-header {
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 100;
  }

  #back-btn {
    display: none;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 24px;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
    min-width: 44px;
    min-height: 44px;
    align-items: center;
  }

  .header-title {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    flex: 1;
  }

  #header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  #panels {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #list-panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
    will-change: transform;
  }

  #day-panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
    will-change: transform;
  }

  #day-panel.visible   { transform: translateX(0); }
  #list-panel.hidden   { transform: translateX(-25%); }

  @media (min-width: 680px) {
    #panels { display: flex; }
    #list-panel, #day-panel {
      position: relative;
      transform: none !important;
      transition: none;
    }
    #list-panel { width: 240px; border-right: 1px solid var(--border); flex-shrink: 0; }
    #day-panel  { flex: 1; }
    #back-btn   { display: none !important; }
  }

  .tree-year-btn {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .tree-year-btn .arrow { font-size: 10px; transition: transform .2s; }
  .tree-year-btn.collapsed .arrow { transform: rotate(-90deg); }

  .month-block { border-bottom: 1px solid var(--border); }

  .month-btn {
    width: 100%;
    background: none;
    border: none;
    padding: 14px 20px 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    border-left: 3px solid transparent;
    min-height: 48px;
    transition: background .1s;
  }
  .month-btn:active { background: var(--surface); }
  .month-btn.active { color: var(--accent); border-left-color: var(--accent); background: #1a1e00; }

  .badge {
    font-size: 11px;
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    flex-shrink: 0;
  }
  .month-btn.active .badge { background: #2a3300; color: var(--accent); }

  .day-list { overflow: hidden; }
  .day-list.collapsed { display: none; }

  .day-btn {
    width: 100%;
    background: none;
    border: none;
    padding: 12px 20px 12px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    border-left: 3px solid transparent;
    min-height: 48px;
    transition: background .1s;
  }
  .day-btn:active { background: var(--surface); }
  .day-btn.active { color: var(--accent); border-left-color: var(--accent); background: #1a1e00; }
  .day-btn .badge { font-size: 10px; }

  .day-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
  }

  .day-title {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text);
    margin-bottom: 9px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .3s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Courier Prime', monospace;
    min-width: 50px;
    text-align: right;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Courier Prime', monospace;
    cursor: pointer;
    border-radius: 4px;
    min-height: 44px;
    -webkit-appearance: none;
    transition: all .1s;
  }
  .btn:active { background: var(--surface); color: var(--text); border-color: var(--text); }
  .btn.danger:active { color: var(--accent2); border-color: var(--accent2); }

  .cat-header {
    padding: 11px 20px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .cat-count { color: var(--accent); }

  .record-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    min-height: 76px;
    -webkit-user-select: none;
    user-select: none;
    transition: background .1s;
  }
  .record-item:active { background: var(--surface); }
  .record-item.checked { background: var(--checked-bg); }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #444;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    color: transparent;
    transition: all .15s;
  }
  .record-item.checked .check-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .record-thumb {
    width: 54px;
    height: 54px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
    border-radius: 3px;
  }

  .record-info { flex: 1; min-width: 0; }

  .record-artist {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .record-item.checked .record-artist { color: var(--checked-text); }

  .record-title {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .record-item.checked .record-title { color: #3d5000; }

  .record-tags {
    display: flex;
    gap: 5px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    padding: 1px 5px;
    background: var(--surface2);
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .tag.used    { color: var(--accent2); border: 1px solid var(--accent2); background: none; }
  .tag.preorder{ color: #00c8ff; border: 1px solid #00c8ff; background: none; }

  .record-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .record-link-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--muted);
    text-decoration: none;
    font-size: 16px;
    transition: all .1s;
  }
  .record-link-btn:active { color: var(--accent); border-color: var(--accent); }

  .heart-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--muted);
    background: none;
    font-size: 16px;
    cursor: pointer;
    transition: all .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .heart-btn:active { color: #ff4b00; border-color: #ff4b00; }
  .heart-btn.pooled { color: #ff4b00; border-color: #ff4b00; }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 2.2;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; }

  #pool-tab-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    flex-shrink: 0;
    min-height: 34px;
    font-family: 'Courier Prime', monospace;
    letter-spacing: 0.05em;
    transition: all .15s;
  }
  #pool-tab-btn.active { color: #ff4b00; border-color: #ff4b00; background: #1f0a00; }

  #pool-page {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #pool-page.visible { display: block; }

  .pool-page-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pool-page-title {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #ff4b00;
    text-transform: uppercase;
  }

  .pool-clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    letter-spacing: 0.05em;
  }
  .pool-clear-btn:active { color: #ff4b00; border-color: #ff4b00; }

  .pool-close-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 15px;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    flex-shrink: 0;
    min-width: 60px;
    min-height: 44px;
  }

  #settings-page {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #settings-page.visible { display: block; }

  .settings-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .settings-title {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    flex: 1;
  }
  .settings-body {
    padding: 24px 20px;
  }
  .settings-section-title {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .settings-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    min-width: 60px;
  }
  .settings-input {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Courier Prime', monospace;
    flex: 1;
    min-width: 130px;
  }
  .settings-input:focus { outline: none; border-color: var(--accent); }
  .settings-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    letter-spacing: 0.08em;
    width: 100%;
    margin-top: 8px;
  }
  .settings-btn:active { background: #1a2a00; }
  .settings-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .settings-token-row {
    margin-bottom: 14px;
  }
  .settings-token-input {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: monospace;
    width: 100%;
    box-sizing: border-box;
  }
  .settings-token-input:focus { outline: none; border-color: var(--accent); }
  .settings-status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
    font-family: 'Courier Prime', monospace;
    min-height: 18px;
    white-space: pre-wrap;
  }
  .settings-status.ok { color: var(--accent); }
  .settings-status.err { color: #ff4b00; }
  #gear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    min-height: 44px;
    min-width: 44px;
  }
  #gear-btn:hover { color: var(--text); }

  .record-links {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .apple-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #2a2a2a;
    background: #181818;
    color: #e8e8e8;
    font-size: 12px;
    line-height: 1;
    text-decoration: none;
    cursor: pointer;
  }

  .apple-link:hover {
    opacity: 0.85;
  }

</style>
</head>
<body>
<div id="app">

  <header id="app-header">
    <button id="back-btn" onclick="showList()">‹</button>
    <div class="header-title">Newtone Records</div>
    <div id="header-sub">新譜チェック</div>
    <button id="pool-tab-btn" onclick="togglePoolPage()">♡ <span id="pool-tab-count">0</span></button>
    <button id="gear-btn" onclick="toggleSettingsPage()" title="設定">⚙</button>
  </header>

  <div id="panels">
    <div id="list-panel"><div id="tree"></div></div>
    <div id="day-panel"><div id="day-content"><div class="empty">読み込み中...</div></div></div>
  </div>

  <div id="pool-page">
    <div id="pool-page-content"></div>
  </div>

  <div id="settings-page">
    <div class="settings-header">
      <button class="pool-close-btn" onclick="toggleSettingsPage()">‹ 戻る</button>
      <div class="settings-title">Settings</div>
    </div>
    <div class="settings-body">

      <div class="settings-section-title">過去データ取得</div>
      <div class="settings-row">
        <span class="settings-label">開始日</span>
        <input class="settings-input" type="date" id="date-from-input" />
      </div>
      <div class="settings-row">
        <span class="settings-label">終了日</span>
        <input class="settings-input" type="date" id="date-to-input" />
      </div>
      <button class="settings-btn" id="fetch-range-btn" onclick="triggerRangeScrape()">取得する</button>
      <div class="settings-status" id="settings-status"></div>

    </div>
  </div>

</div>
<script>
// ── Storage helpers ──
const LS_DATA         = 'nt_data';
const LS_CHECKED      = 'nt_checked';
const LS_FETCHED      = 'nt_fetched';
const LS_POOL         = 'nt_pool';
const LS_REMOVED_IDS  = 'nt_removed_ids';
const LS_REMOVED_DAYS = 'nt_removed_days';

function loadStorage(key, def) {
  try { return JSON.parse(localStorage.getItem(key) || 'null') ?? def; } catch(e) { return def; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let localData    = loadStorage(LS_DATA, {});
let checked      = loadStorage(LS_CHECKED, {});
let pool         = loadStorage(LS_POOL, {});
let removedIds   = loadStorage(LS_REMOVED_IDS, {});
let removedDays  = loadStorage(LS_REMOVED_DAYS, {});
let activeDay = null, activeMonth = null;

// ── GitHub settings ──
const RANGE_API_BASE = 'https://newtone-range-worker.dechnobow-newtone.workers.dev';

// ── Fetch data.json and merge into localStorage ──
async function fetchAndMerge() {
  try {
    const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch failed');
    const groups = await res.json();

    if (!Array.isArray(groups) || groups.length === 0) return;

    const existingIds = new Set();
    Object.values(localData).forEach(g => {
      (g.records || []).forEach(r => {
        if (r && r.id) existingIds.add(r.id);
      });
    });

    groups.forEach(g => {
      const date = g.date;
      const category = g.category || 'new';
      
      if (category === 'range') return;
      if (!date) return;
      if (removedDays[date]) return;

      const key = `${date}|${category}`;
      const incomingRecords = (Array.isArray(g.records) ? g.records : []).filter(r => {
        if (!r || !r.id) return false;
        if (removedIds[r.id]) return false;
        return true;
      });

      if (category === 'range') {
        if (incomingRecords.length === 0) return;
        localData[key] = {
          ...g,
          category,
          records: incomingRecords
        };
        incomingRecords.forEach(r => existingIds.add(r.id));
        return;
      }

      const newRecs = incomingRecords.filter(r => !existingIds.has(r.id));
      if (newRecs.length === 0) return;

      if (!localData[key]) {
        localData[key] = {
          ...g,
          category,
          records: newRecs
        };
      } else {
        localData[key].records.push(...newRecs);
      }

      newRecs.forEach(r => existingIds.add(r.id));
    });

    saveStorage(LS_DATA, localData);
    saveStorage(LS_FETCHED, Date.now());
  } catch(e) {
    console.log('data.json fetch failed:', e);
  }
}

function mergeRangeGroups(groups) {
  if (!Array.isArray(groups) || groups.length === 0) return 0;

  const targetDates = new Set(
    groups
      .map(g => g.date)
      .filter(date => date && !removedDays[date])
  );

  Object.keys(localData).forEach(key => {
    const date = key.split('|')[0];
    if (targetDates.has(date)) {
      delete localData[key];
    }
  });

  let added = 0;

  groups.forEach(g => {
    const date = g.date;
    if (!date || removedDays[date]) return;

    const incomingRecords = (Array.isArray(g.records) ? g.records : []).filter(r => {
      if (!r || !r.id) return false;
      if (removedIds[r.id]) return false;
      return true;
    });

    if (incomingRecords.length === 0) return;

    const key = `${date}|range`;
    localData[key] = {
      date,
      category: 'range',
      records: incomingRecords
    };

    added += incomingRecords.length;
  });

  saveStorage(LS_DATA, localData);
  saveStorage(LS_FETCHED, Date.now());

  return added;
}

// ── Build tree from localData ──
function buildTree() {
  const t = {};
  Object.values(localData).forEach(g => {
    const [y, mo] = g.date.split('-');
    const m = y + '-' + mo;
    if (!t[y]) t[y] = {};
    if (!t[y][m]) t[y][m] = {};
    if (!t[y][m][g.date]) t[y][m][g.date] = [];
    t[y][m][g.date].push(...(g.records || []).map(r => ({ ...r, category: g.category })));
  });

  Object.keys(t).forEach(y => Object.keys(t[y]).forEach(m => Object.keys(t[y][m]).forEach(d => {
    const seen = new Set();
    t[y][m][d] = t[y][m][d].filter(r => {
      if (seen.has(r.id)) return false;
      seen.add(r.id);
      return true;
    });
  })));

  return t;
}

async function triggerRangeScrape() {
  const dateFrom = document.getElementById('date-from-input').value;
  const dateTo   = document.getElementById('date-to-input').value;

  if (!dateFrom || !dateTo) {
    setStatus('開始日と終了日を入力してください', 'err');
    return;
  }
  if (dateFrom > dateTo) {
    setStatus('開始日は終了日より前にしてください', 'err');
    return;
  }

  const btn = document.getElementById('fetch-range-btn');
  btn.disabled = true;
  setStatus('取得ジョブを開始しています...', '');

  try {
    const startUrl = `${RANGE_API_BASE}/api/range/start?from=${encodeURIComponent(dateFrom)}&to=${encodeURIComponent(dateTo)}`;
    const startRes = await fetch(startUrl);
    const startJson = await startRes.json();

    if (!startRes.ok || !startJson.ok) {
      throw new Error(startJson.error || `開始失敗 (${startRes.status})`);
    }

    const jobId = startJson.jobId;
    if (!jobId) {
      throw new Error('jobId を取得できませんでした');
    }

    setStatus('取得中です... しばらくお待ちください', '');

    let tries = 0;
    const maxTries = 24; // 約2分

    const poll = async () => {
      tries++;

      const resultUrl = `${RANGE_API_BASE}/api/range/result?id=${encodeURIComponent(jobId)}`;
      const resultRes = await fetch(resultUrl);
      const resultJson = await resultRes.json();

      if (!resultRes.ok) {
        throw new Error(resultJson.error || `結果取得失敗 (${resultRes.status})`);
      }

      if (resultJson.status === 'done') {
        const added = mergeRangeGroups(resultJson.data || []);
        tree = buildTree();
        renderTree();

        const rangeDays = [];
        Object.keys(tree).forEach(y =>
          Object.keys(tree[y]).forEach(m =>
            Object.keys(tree[y][m]).forEach(d => {
              const recs = tree[y][m][d] || [];
              if (recs.some(r => r.category === 'range')) {
                rangeDays.push(d);
              }
            })
          )
        );

        rangeDays.sort().reverse();

        if (rangeDays.length) {
          const latest = rangeDays[0];
          const [y, mo] = latest.split('-');
          activeMonth = `${y}-${mo}`;
          renderTree();
          selectDay(latest);
        }

        setStatus(`✓ ${added}件を反映しました`, 'ok');
        btn.disabled = false;
        return;
      }

      if (resultJson.status === 'error') {
        throw new Error(resultJson.error || '取得処理でエラーが発生しました');
      }

      if (tries >= maxTries) {
        throw new Error('タイムアウトしました。少し時間を置いて再度お試しください');
      }

      setStatus(`取得中です... (${tries * 5}秒経過)`, '');
      setTimeout(async () => {
        try {
          await poll();
        } catch (e) {
          setStatus('エラー: ' + (e.message || String(e)), 'err');
          btn.disabled = false;
        }
      }, 5000);
    };

    await poll();

  } catch (e) {
    setStatus('エラー: ' + (e.message || String(e)), 'err');
    btn.disabled = false;
  }
}

function itunesJsonpSearch(params) {
  return new Promise((resolve, reject) => {
    const callbackName = `itunesJsonp_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
    const script = document.createElement('script');

    let finished = false;

    const cleanup = () => {
      finished = true;
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
    };

    window[callbackName] = (data) => {
      if (finished) return;
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      if (finished) return;
      cleanup();
      reject(new Error('JSONP load failed'));
    };

    const qs = new URLSearchParams({
      ...params,
      callback: callbackName
    }).toString();

    script.src = `https://itunes.apple.com/search?${qs}`;
    document.body.appendChild(script);

    setTimeout(() => {
      if (finished) return;
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);
  });
}

function normalizeAppleText(s) {
  return (s || '')
    .toLowerCase()
    .normalize('NFKC')
    .replace(/[^\p{L}\p{N}]+/gu, ' ')
    .trim();
}

function scoreAppleResult(result, artistNorm, titleNorm) {
  const rArtist = normalizeAppleText(result.artistName || '');
  const rAlbum = normalizeAppleText(result.collectionName || '');
  const rTrack = normalizeAppleText(result.trackName || '');

  let score = 0;

  if (artistNorm && rArtist.includes(artistNorm)) score += 50;
  if (titleNorm && rTrack.includes(titleNorm)) score += 45;
  if (titleNorm && rAlbum.includes(titleNorm)) score += 35;

  if (artistNorm && rArtist === artistNorm) score += 30;
  if (titleNorm && rTrack === titleNorm) score += 30;
  if (titleNorm && rAlbum === titleNorm) score += 20;

  if (result.wrapperType === 'track') score += 8;
  if (result.wrapperType === 'collection') score += 5;

  return score;
}

function pickBestAppleResult(results, artist, title) {
  const artistNorm = normalizeAppleText(artist);
  const titleNorm = normalizeAppleText(title);

  return results
    .map(r => ({
      ...r,
      _score: scoreAppleResult(r, artistNorm, titleNorm)
    }))
    .sort((a, b) => b._score - a._score)[0];
}

async function openAppleMusic(record, event) {
  if (event) event.stopPropagation();

  const artist = (record?.artist || '').trim();
  const title = (record?.title || '').trim();
  const query = [artist, title].filter(Boolean).join(' ');

  console.log('Apple Music query:', query);

  if (!query) {
    alert('検索対象がありません');
    return;
  }

  try {
    const songData = await itunesJsonpSearch({
      term: query,
      country: 'JP',
      media: 'music',
      entity: 'song',
      limit: '20',
      lang: 'ja_jp'
    });

    let results = Array.isArray(songData.results) ? songData.results : [];

    if (!results.length) {
      const albumData = await itunesJsonpSearch({
        term: query,
        country: 'JP',
        media: 'music',
        entity: 'album',
        limit: '20',
        lang: 'ja_jp'
      });
      results = Array.isArray(albumData.results) ? albumData.results : [];
    }

    if (!results.length) {
      alert('Apple Musicで見つかりません');
      return;
    }

    const best = pickBestAppleResult(results, artist, title);

    if (!best || (best._score ?? 0) <= 0) {
      alert('Apple Musicで見つかりません');
      return;
    }

    const targetUrl =
      best.trackViewUrl ||
      best.collectionViewUrl ||
      best.artistViewUrl;

    if (!targetUrl) {
      alert('Apple Musicで見つかりません');
      return;
    }

    window.open(targetUrl, '_blank', 'noopener,noreferrer');
  } catch (err) {
    console.error('Apple Music search error:', err);
    alert('Apple Music検索に失敗しました');
  }
}

</script>
</body>
</html>
