<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NT Records">
<title>NEWTONE RECORDS — 新譜チェック</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: #2a2a2a;
    --accent: #d4ff00;
    --accent2: #ff4b00;
    --text: #e8e8e8;
    --muted: #666;
    --checked-bg: #1a1f00;
    --checked-text: #6a8a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  #app-header {
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 100;
  }

  #back-btn {
    display: none;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 24px;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
    min-width: 44px;
    min-height: 44px;
    align-items: center;
  }

  .header-title {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    flex: 1;
  }

  #header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  #panels {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #list-panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
    will-change: transform;
  }

  #day-panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
    will-change: transform;
  }

  #day-panel.visible   { transform: translateX(0); }
  #list-panel.hidden   { transform: translateX(-25%); }

  @media (min-width: 680px) {
    #panels { display: flex; }
    #list-panel, #day-panel {
      position: relative;
      transform: none !important;
      transition: none;
    }
    #list-panel { width: 240px; border-right: 1px solid var(--border); flex-shrink: 0; }
    #day-panel  { flex: 1; }
    #back-btn   { display: none !important; }
  }

  .tree-year-btn {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .tree-year-btn .arrow { font-size: 10px; transition: transform .2s; }
  .tree-year-btn.collapsed .arrow { transform: rotate(-90deg); }

  .month-block { border-bottom: 1px solid var(--border); }

  .month-btn {
    width: 100%;
    background: none;
    border: none;
    padding: 14px 20px 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    border-left: 3px solid transparent;
    min-height: 48px;
    transition: background .1s;
  }
  .month-btn:active { background: var(--surface); }
  .month-btn.active { color: var(--accent); border-left-color: var(--accent); background: #1a1e00; }

  .badge {
    font-size: 11px;
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    flex-shrink: 0;
  }
  .month-btn.active .badge { background: #2a3300; color: var(--accent); }

  .day-list { overflow: hidden; }
  .day-list.collapsed { display: none; }

  .day-btn {
    width: 100%;
    background: none;
    border: none;
    padding: 12px 20px 12px 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    border-left: 3px solid transparent;
    min-height: 48px;
    transition: background .1s;
  }
  .day-btn:active { background: var(--surface); }
  .day-btn.active { color: var(--accent); border-left-color: var(--accent); background: #1a1e00; }
  .day-btn .badge { font-size: 10px; }

  .day-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
  }

  .day-title {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text);
    margin-bottom: 9px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .3s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    font-family: 'Courier Prime', monospace;
    min-width: 50px;
    text-align: right;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Courier Prime', monospace;
    cursor: pointer;
    border-radius: 4px;
    min-height: 44px;
    -webkit-appearance: none;
    transition: all .1s;
  }
  .btn:active { background: var(--surface); color: var(--text); border-color: var(--text); }
  .btn.danger:active { color: var(--accent2); border-color: var(--accent2); }

  .cat-header {
    padding: 11px 20px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .cat-count { color: var(--accent); }

  .record-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    min-height: 76px;
    -webkit-user-select: none;
    user-select: none;
    transition: background .1s;
  }
  .record-item:active { background: var(--surface); }
  .record-item.checked { background: var(--checked-bg); }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #444;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    color: transparent;
    transition: all .15s;
  }
  .record-item.checked .check-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .record-thumb {
    width: 54px;
    height: 54px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
    border-radius: 3px;
  }

  .record-info { flex: 1; min-width: 0; }

  .record-artist {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .record-item.checked .record-artist { color: var(--checked-text); }

  .record-title {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
  }
  .record-item.checked .record-title { color: #3d5000; }

  .record-tags {
    display: flex;
    gap: 5px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    padding: 1px 5px;
    background: var(--surface2);
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .tag.used    { color: var(--accent2); border: 1px solid var(--accent2); background: none; }
  .tag.preorder{ color: #00c8ff; border: 1px solid #00c8ff; background: none; }

  .record-link-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--muted);
    text-decoration: none;
    font-size: 16px;
    transition: all .1s;
  }
  .record-link-btn:active { color: var(--accent); border-color: var(--accent); }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 2.2;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>
<body>
<div id="app">

  <header id="app-header">
    <button id="back-btn" onclick="showList()">‹</button>
    <div class="header-title">Newtone Records</div>
    <div id="header-sub">新譜チェック</div>
  </header>

  <div id="panels">
    <div id="list-panel"><div id="tree"></div></div>
    <div id="day-panel"><div id="day-content"><div class="empty">読み込み中...</div></div></div>
  </div>

</div>
<script>
// ── Storage helpers ──
const LS_DATA    = 'nt_data';    // {date_category: {date, category, records[]}}
const LS_CHECKED = 'nt_checked'; // {id: true}
const LS_FETCHED = 'nt_fetched'; // last fetched timestamp

function loadStorage(key, def) {
  try { return JSON.parse(localStorage.getItem(key) || 'null') ?? def; } catch(e) { return def; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let localData = loadStorage(LS_DATA, {});    // key: "date|category"
let checked   = loadStorage(LS_CHECKED, {});
let activeDay = null, activeMonth = null;

// ── Fetch data.json and merge into localStorage ──
async function fetchAndMerge() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const groups = await res.json();
    groups.forEach(g => {
      const key = g.date + '|' + g.category;
      if (!localData[key]) {
        localData[key] = g;
      } else {
        // 既存IDセット
        const existingIds = new Set(localData[key].records.map(r => r.id));
        const newRecs = g.records.filter(r => !existingIds.has(r.id));
        if (newRecs.length > 0) {
          localData[key].records.push(...newRecs);
        }
      }
    });
    saveStorage(LS_DATA, localData);
    saveStorage(LS_FETCHED, Date.now());
  } catch(e) {
    console.log('data.json fetch failed:', e);
  }
}

// ── Build tree from localData ──
function buildTree() {
  const t = {};
  Object.values(localData).forEach(g => {
    const [y, mo] = g.date.split('-');
    const m = y + '-' + mo;
    if (!t[y]) t[y] = {};
    if (!t[y][m]) t[y][m] = {};
    if (!t[y][m][g.date]) t[y][m][g.date] = [];
    t[y][m][g.date].push(...g.records.map(r => ({...r, category: g.category})));
  });
  // 重複除去
  Object.keys(t).forEach(y => Object.keys(t[y]).forEach(m => Object.keys(t[y][m]).forEach(d => {
    const seen = new Set();
    t[y][m][d] = t[y][m][d].filter(r => { if(seen.has(r.id)) return false; seen.add(r.id); return true; });
  })));
  return t;
}

let tree = {};

function save() { saveStorage(LS_CHECKED, checked); }
function dayChecked(recs) { return recs.filter(r => checked[r.id]).length; }
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtMonth(ym) { const [y,m] = ym.split('-'); return MN[+m-1] + ' ' + y; }
function fmtDay(date) { const d = new Date(date + 'T00:00:00'); return `${d.getDate()} ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]}`; }

// ── Render tree ──
function renderTree() {
  let html = '';
  Object.keys(tree).sort().reverse().forEach(y => {
    html += `<button class="tree-year-btn" onclick="toggleYear('${y}')" data-year="${y}">${y}<span class="arrow">▼</span></button><div id="ym-${y}">`;
    Object.keys(tree[y]).sort().reverse().forEach(m => {
      const days = Object.keys(tree[y][m]).sort().reverse();
      const total = days.reduce((a,d) => a + tree[y][m][d].length, 0);
      const open = activeMonth === m;
      html += `<div class="month-block"><button class="month-btn ${open?'active':''}" onclick="toggleMonth('${m}','${y}')" id="mbtn-${m}"><span>${fmtMonth(m)}</span><span class="badge">${total}</span></button><div class="day-list ${open?'':'collapsed'}" id="dl-${m}">`;
      days.forEach(d => {
        const recs = tree[y][m][d]; const chk = dayChecked(recs);
        html += `<button class="day-btn ${activeDay===d?'active':''}" onclick="selectDay('${d}')" id="dbtn-${d}"><span>${fmtDay(d)}</span><span class="badge">${chk}/${recs.length}</span></button>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  if (!html) html = '<div class="empty">データがありません</div>';
  document.getElementById('tree').innerHTML = html;
}

function toggleYear(y) {
  const btn = document.querySelector(`[data-year="${y}"]`);
  const list = document.getElementById('ym-' + y);
  btn.classList.toggle('collapsed');
  list.style.display = btn.classList.contains('collapsed') ? 'none' : '';
}

function toggleMonth(m, y) {
  if (activeMonth === m) {
    activeMonth = null;
    document.getElementById('dl-' + m)?.classList.add('collapsed');
    document.getElementById('mbtn-' + m)?.classList.remove('active');
  } else {
    if (activeMonth) {
      document.getElementById('dl-' + activeMonth)?.classList.add('collapsed');
      document.getElementById('mbtn-' + activeMonth)?.classList.remove('active');
    }
    activeMonth = m;
    document.getElementById('dl-' + m)?.classList.remove('collapsed');
    document.getElementById('mbtn-' + m)?.classList.add('active');
  }
}

// ── Day view ──
const catLabels = {thisweek:'今週入荷', new:'新入荷', preorder:'予約受付中', used:'中古盤'};
const catOrder  = ['thisweek','new','preorder','used'];

function selectDay(date) {
  activeDay = date;
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  if (activeMonth !== m) toggleMonth(m, y);
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dbtn-' + date)?.classList.add('active');
  renderDay(date);
  if (window.innerWidth < 680) {
    document.getElementById('day-panel').classList.add('visible');
    document.getElementById('list-panel').classList.add('hidden');
    document.getElementById('back-btn').style.display = 'flex';
    document.getElementById('header-sub').textContent = fmtDay(date);
  }
}

function showList() {
  document.getElementById('day-panel').classList.remove('visible');
  document.getElementById('list-panel').classList.remove('hidden');
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-sub').textContent = '新譜チェック';
}

function renderDay(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];
  const chk = dayChecked(recs);
  const pct = recs.length ? Math.round(chk / recs.length * 100) : 0;
  const groups = {};
  recs.forEach(r => { if (!groups[r.category]) groups[r.category] = []; groups[r.category].push(r); });

  let html = `<div class="day-header">
    <div class="day-title">${date} — ${fmtDay(date)}</div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${pct}%"></div></div>
      <div class="progress-label" id="plabel">${chk} / ${recs.length}</div>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="checkAll('${date}')">すべてチェック</button>
    <button class="btn danger" onclick="uncheckAll('${date}')">リセット</button>
  </div>`;

  catOrder.filter(c => groups[c]).forEach(cat => {
    const cr = groups[cat]; const cc = dayChecked(cr);
    html += `<div class="cat-header"><span>${catLabels[cat]}</span><span class="cat-count">${cc}/${cr.length}</span></div>`;
    cr.forEach(r => {
      const ck = !!checked[r.id];
      html += `<div class="record-item ${ck?'checked':''}" id="row-${r.id}" onclick="toggle('${r.id}','${date}')">
        <div class="check-circle">${ck?'✓':''}</div>
        <img class="record-thumb" src="${r.img}" onerror="this.style.opacity=0" loading="lazy">
        <div class="record-info">
          <div class="record-artist">${r.artist||''}</div>
          <div class="record-title">${r.title||''}</div>
          <div class="record-tags">
            ${r.format?`<span class="tag">${r.format}</span>`:''}
            ${r.label?`<span class="tag">${r.label}</span>`:''}
            ${r.genre?`<span class="tag">${r.genre}</span>`:''}
            ${r.used?`<span class="tag used">USED</span>`:''}
            ${r.preorder?`<span class="tag preorder">予約</span>`:''}
          </div>
        </div>
        <a class="record-link-btn" href="${r.url}" target="_self" onclick="event.stopPropagation()">↗</a>
      </div>`;
    });
  });

  document.getElementById('day-content').innerHTML = html;
  document.getElementById('day-panel').scrollTop = 0;
}

function toggle(id, date) {
  checked[id] = !checked[id]; save();
  const row = document.getElementById('row-' + id);
  const circle = row.querySelector('.check-circle');
  if (checked[id]) { row.classList.add('checked'); circle.textContent = '✓'; }
  else { row.classList.remove('checked'); circle.textContent = ''; }
  updateCatCounts(date);
  updateProgress(date);
  updateDayBadge(date);

  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];
  const allChecked = recs.length > 0 && recs.every(r => checked[r.id]);
  if (allChecked) {
    setTimeout(() => {
      if (confirm(`${date} のチェックが完了しました。リストから削除しますか？`)) {
        deleteDay(date);
      }
    }, 300);
  }
}

function deleteDay(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];

  // localStorageからデータ削除
  Object.keys(localData).forEach(key => {
    if (key.startsWith(date + '|')) delete localData[key];
  });
  saveStorage(LS_DATA, localData);

  // チェック状態も削除
  recs.forEach(r => { delete checked[r.id]; });
  save();

  // treeから削除
  delete tree[y][m][date];
  if (Object.keys(tree[y][m]).length === 0) delete tree[y][m];
  if (Object.keys(tree[y]).length === 0) delete tree[y];

  activeDay = null;
  showList();
  renderTree();
  document.getElementById('day-content').innerHTML = '<div class="empty">日付を選んでください</div>';
}

function updateProgress(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];
  const chk = dayChecked(recs); const pct = recs.length ? Math.round(chk/recs.length*100) : 0;
  const pf = document.getElementById('pfill'); if(pf) pf.style.width = pct + '%';
  const pl = document.getElementById('plabel'); if(pl) pl.textContent = chk + ' / ' + recs.length;
}

function updateCatCounts(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];
  const groups = {};
  recs.forEach(r => { if(!groups[r.category]) groups[r.category]=[]; groups[r.category].push(r); });
  document.querySelectorAll('.cat-header').forEach(h => {
    const label = h.querySelector('span:first-child').textContent;
    const cat = Object.keys(catLabels).find(k => catLabels[k] === label);
    if (cat && groups[cat]) h.querySelector('.cat-count').textContent = dayChecked(groups[cat]) + '/' + groups[cat].length;
  });
}

function updateDayBadge(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  const recs = tree[y]?.[m]?.[date] || [];
  const chk = dayChecked(recs);
  const badge = document.querySelector('#dbtn-' + date + ' .badge');
  if (badge) badge.textContent = chk + '/' + recs.length;
}

function checkAll(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  (tree[y]?.[m]?.[date] || []).forEach(r => { checked[r.id] = true; }); save(); renderDay(date);
  updateDayBadge(date);
}

function uncheckAll(date) {
  const [y,mo] = date.split('-'); const m = y + '-' + mo;
  (tree[y]?.[m]?.[date] || []).forEach(r => { delete checked[r.id]; }); save(); renderDay(date);
  updateDayBadge(date);
}

// ── Init ──
async function init() {
  await fetchAndMerge();
  tree = buildTree();
  renderTree();

  const allDays = [];
  Object.keys(tree).forEach(y => Object.keys(tree[y]).forEach(m => Object.keys(tree[y][m]).forEach(d => allDays.push(d))));
  allDays.sort().reverse();

  if (allDays.length) {
    const latest = allDays[0];
    const [y,mo] = latest.split('-'); activeMonth = y + '-' + mo;
    renderTree();
    if (window.innerWidth >= 680) selectDay(latest);
    else document.getElementById('day-content').innerHTML = '<div class="empty">日付を選んでください</div>';
  }
}

init();
</script>
</body>
