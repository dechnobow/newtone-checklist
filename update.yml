name: Daily Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Full scrape (all pages / past history)'
        required: false
        default: 'false'
        type: boolean
      date_from:
        description: 'Date from (YYYY-MM-DD) for range scrape'
        required: false
        default: ''
        type: string
      date_to:
        description: 'Date to (YYYY-MM-DD) for range scrape'
        required: false
        default: ''
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          if [ -n "${{ github.event.inputs.date_from }}" ] && [ -n "${{ github.event.inputs.date_to }}" ]; then
            echo "Running range scrape: ${{ github.event.inputs.date_from }} ~ ${{ github.event.inputs.date_to }}"
            python scraper.py --from "${{ github.event.inputs.date_from }}" --to "${{ github.event.inputs.date_to }}"
          elif [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
            echo "Running full scrape..."
            python scraper.py --full
          else
            echo "Running daily scrape..."
            python scraper.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update: $(date +'%Y-%m-%d')"
          git push origin main
