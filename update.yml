name: Daily Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Full scrape (all pages / past history)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
            echo "Running full scrape..."
            python scraper.py --full
          else
            echo "Running daily scrape..."
            python scraper.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update: $(date +'%Y-%m-%d')"
          git push origin main
