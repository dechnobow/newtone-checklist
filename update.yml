name: Daily Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Full scrape (all pages / past history)'
        required: false
        default: false
        type: boolean
      date_from:
        description: 'Date from (YYYY-MM-DD) for range scrape'
        required: false
        default: ''
        type: string
      date_to:
        description: 'Date to (YYYY-MM-DD) for range scrape'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          if [ -n "${{ inputs.date_from }}" ] && [ -n "${{ inputs.date_to }}" ]; then
            echo "Running range scrape: ${{ inputs.date_from }} ~ ${{ inputs.date_to }}"
            python scraper.py --from "${{ inputs.date_from }}" --to "${{ inputs.date_to }}"
          elif [ "${{ inputs.full_scrape }}" = "true" ]; then
            echo "Running full scrape..."
            python scraper.py --full
          else
            echo "Running daily scrape..."
            python scraper.py
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update data.json"

      - name: Push changes
        run: |
          git push
